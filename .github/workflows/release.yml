name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ktool
  ZIG_VERSION: "0.13.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux musl static (x86_64) — cargo-zigbuild (Zig ships musl libc).
          - target: x86_64-unknown-linux-musl
            tool: zigbuild
            archive: tar.gz

          # Linux musl static (ARM64) — cargo-zigbuild.
          - target: aarch64-unknown-linux-musl
            tool: zigbuild
            archive: tar.gz

          # macOS Intel — cargo-zigbuild.
          - target: x86_64-apple-darwin
            tool: zigbuild
            archive: tar.gz

          # macOS Apple Silicon — cargo-zigbuild.
          - target: aarch64-apple-darwin
            tool: zigbuild
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential gcc xz-utils musl-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Zig + cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: |
          ZIG="zig-linux-x86_64-${ZIG_VERSION}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG}.tar.xz" \
            | tar -xJ -C /tmp
          sudo mv "/tmp/${ZIG}" /opt/zig
          sudo ln -sf /opt/zig/zig /usr/local/bin/zig
          zig version
          cargo install cargo-zigbuild --locked

      - name: Build (zigbuild)
        if: matrix.tool == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
          ARCHIVE="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "$(dirname "${BIN}")" "$(basename "${BIN}")"
          echo "ASSET=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**
