name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ktool

permissions:
  contents: write   # needed to create/upload the GitHub Release

jobs:
  # ── build ──────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (most CI runners, most dev machines)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: ktool-x86_64-unknown-linux-musl.tar.gz

          # Linux ARM64 (Graviton, Raspberry Pi 4+, etc.)
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: ktool-aarch64-unknown-linux-musl.tar.gz

          # macOS Intel
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: ktool-x86_64-apple-darwin.tar.gz

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: ktool-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # cross is the easiest way to build musl/ARM on a GitHub-hosted runner
      - name: Install cross (Linux targets)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (Linux — cross)
        if: runner.os == 'Linux'
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (macOS — native cargo)
        if: runner.os == 'macOS'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          tar -czvf "${{ matrix.archive }}" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"

      # Upload as a workflow artifact so other pipelines can consume it
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 90

  # ── release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.2.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
