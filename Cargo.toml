[package]
name = "karluiz-tool"
version = "0.1.0"
edition = "2024"
description = "CLI for karluiz tools"
license = "MIT"

[[bin]]
name = "ktool"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
dirs = "6.0"
reqwest = { version = "0.13", features = ["blocking", "json"] }
rpassword = "7.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"

[dev-dependencies]
tempfile = "3"
