[package]
name = "karluiz-tool"
version = "0.1.0"
edition = "2024"
description = "CLI for karluiz tools"
license = "MIT"

[[bin]]
name = "karluiz-tool"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
reqwest = { version = "0.13", features = ["blocking", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
